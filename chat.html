<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Memet — Your Space</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--p1:#c084fc;--p2:#a855f7;--p3:#7c3aed;--r1:#f9a8d4;--r2:#ec4899;--l1:#e9d5ff;--l2:#ddd6fe;--cream:#fdf4ff;--text:#1a0533;--texts:#6b21a8;--textm:#a78bca;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden;height:100vh;display:flex;flex-direction:column;}

/* BG */
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(233,213,255,0.6) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 20%,rgba(249,168,212,0.3) 0%,transparent 55%),radial-gradient(ellipse 70% 60% at 50% 80%,rgba(221,214,254,0.4) 0%,transparent 60%),linear-gradient(160deg,#fdf4ff 0%,#fae8ff 40%,#ede9fe 100%);animation:bgS 15s ease-in-out infinite alternate;}
@keyframes bgS{0%{filter:hue-rotate(0deg);}100%{filter:hue-rotate(12deg);}}
.orb{position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;animation:oF ease-in-out infinite;}
.o1{width:400px;height:400px;background:radial-gradient(circle,rgba(192,132,252,0.25),transparent 70%);top:-100px;left:-100px;animation-duration:18s;}
.o2{width:350px;height:350px;background:radial-gradient(circle,rgba(249,168,212,0.2),transparent 70%);bottom:-80px;right:-80px;animation-duration:22s;animation-delay:-8s;}
@keyframes oF{0%,100%{transform:translate(0,0);}50%{transform:translate(25px,-25px);}}
canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* TOPBAR */
.topbar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:0.9rem 1.5rem;background:rgba(255,255,255,0.65);backdrop-filter:blur(20px);border-bottom:1px solid rgba(192,132,252,0.15);flex-shrink:0;}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;color:var(--p3);display:flex;align-items:center;gap:0.5rem;text-decoration:none;}
.topbar-logo-dot{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--p2),var(--r1));display:flex;align-items:center;justify-content:center;font-size:0.75rem;animation:lp 3s ease-in-out infinite;}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(168,85,247,0.4);}50%{box-shadow:0 0 0 6px rgba(168,85,247,0);}}
.topbar-right{display:flex;align-items:center;gap:0.75rem;}
.user-chip{display:flex;align-items:center;gap:0.5rem;background:rgba(233,213,255,0.5);border:1px solid rgba(192,132,252,0.25);border-radius:50px;padding:0.3rem 0.9rem 0.3rem 0.4rem;font-size:0.78rem;}
.user-chip-av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--p2),var(--r1));display:flex;align-items:center;justify-content:center;font-size:0.7rem;}
.user-chip-name{color:var(--p3);font-weight:500;}
.topbar-btn{padding:0.4rem 1rem;border-radius:50px;border:1px solid rgba(192,132,252,0.25);background:rgba(255,255,255,0.6);font-family:'DM Sans',sans-serif;font-size:0.75rem;color:var(--textm);cursor:pointer;transition:all 0.2s;backdrop-filter:blur(8px);}
.topbar-btn:hover{background:rgba(233,213,255,0.6);color:var(--p3);}
.logout-btn{padding:0.4rem 1rem;border-radius:50px;border:1px solid rgba(192,132,252,0.2);background:transparent;font-family:'DM Sans',sans-serif;font-size:0.75rem;color:var(--textm);cursor:pointer;transition:all 0.2s;}
.logout-btn:hover{color:var(--p3);}

/* GUEST BANNER */
.guest-banner{position:relative;z-index:5;background:linear-gradient(135deg,rgba(233,213,255,0.7),rgba(249,168,212,0.4));border-bottom:1px solid rgba(192,132,252,0.2);padding:0.6rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;flex-shrink:0;}
.guest-banner p{font-size:0.78rem;color:var(--p3);}
.guest-banner a{padding:0.3rem 0.9rem;border-radius:50px;background:linear-gradient(135deg,var(--p2),var(--p3));color:white;font-size:0.75rem;font-family:'DM Sans',sans-serif;text-decoration:none;font-weight:500;box-shadow:0 2px 10px rgba(124,58,237,0.25);transition:all 0.2s;}
.guest-banner a:hover{transform:translateY(-1px);}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;max-width:720px;width:100%;margin:0 auto;padding:1.5rem 1.5rem 0;position:relative;z-index:1;overflow:hidden;}

/* MEMET HEADER */
.memet-hd{text-align:center;padding:1rem 0 1.5rem;flex-shrink:0;}
.av-wrap{position:relative;width:64px;height:64px;margin:0 auto 0.75rem;}
.av-ring{position:absolute;inset:-5px;border-radius:50%;border:1.5px solid rgba(192,132,252,0.35);animation:rr 8s linear infinite;}
.av-ring2{position:absolute;inset:-11px;border-radius:50%;border:1px dashed rgba(192,132,252,0.18);animation:rr 12s linear infinite reverse;}
@keyframes rr{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.av-main{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--p2),var(--r1));display:flex;align-items:center;justify-content:center;font-size:1.8rem;box-shadow:0 8px 30px rgba(168,85,247,0.4);animation:ab 4s ease-in-out infinite;position:relative;z-index:1;}
@keyframes ab{0%,100%{box-shadow:0 8px 30px rgba(168,85,247,0.35),0 0 0 0 rgba(168,85,247,0.15);}50%{box-shadow:0 8px 50px rgba(168,85,247,0.55),0 0 0 12px rgba(168,85,247,0);}}
.memet-hd h2{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:400;color:var(--text);}
.memet-hd p{font-size:0.78rem;color:var(--textm);margin-top:0.2rem;}

/* MOOD ROW */
.mood-row{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:1rem;flex-shrink:0;}
.mood-chip{padding:0.3rem 0.8rem;border-radius:50px;border:1px solid rgba(192,132,252,0.22);background:rgba(255,255,255,0.6);font-size:0.73rem;color:var(--textm);cursor:pointer;transition:all 0.2s;backdrop-filter:blur(8px);}
.mood-chip:hover,.mood-chip.on{background:linear-gradient(135deg,rgba(233,213,255,0.8),rgba(249,168,212,0.5));border-color:rgba(192,132,252,0.45);color:var(--p3);}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:0.5rem 0 1rem;display:flex;flex-direction:column;gap:0.9rem;scrollbar-width:thin;scrollbar-color:rgba(192,132,252,0.3) transparent;}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:rgba(192,132,252,0.35);border-radius:3px;}

.mrow{display:flex;gap:0.65rem;animation:mi 0.35s cubic-bezier(0.16,1,0.3,1);}
@keyframes mi{from{opacity:0;transform:translateY(10px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.mrow.user{flex-direction:row-reverse;}
.mav{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--p2),var(--r1));display:flex;align-items:center;justify-content:center;font-size:0.9rem;align-self:flex-end;box-shadow:0 2px 10px rgba(168,85,247,0.25);}
.mrow.user .mav{background:linear-gradient(135deg,var(--l2),var(--p1));}
.mbody{max-width:72%;}
.mbub{padding:0.85rem 1.1rem;border-radius:18px;font-size:0.88rem;line-height:1.65;}
.mrow.memet .mbub{background:rgba(255,255,255,0.88);color:var(--text);border-bottom-left-radius:4px;box-shadow:0 2px 15px rgba(124,58,237,0.07);backdrop-filter:blur(8px);}
.mrow.user .mbub{background:linear-gradient(135deg,var(--p1),var(--p2));color:white;border-bottom-right-radius:4px;box-shadow:0 4px 20px rgba(124,58,237,0.22);}
.mt{font-size:0.67rem;color:var(--textm);margin-top:0.25rem;padding:0 0.3rem;}
.mrow.user .mt{text-align:right;}

/* TYPING */
.typ-row{display:flex;gap:0.65rem;align-items:flex-end;}
.typ-bub{background:rgba(255,255,255,0.88);padding:0.85rem 1.1rem;border-radius:18px;border-bottom-left-radius:4px;box-shadow:0 2px 15px rgba(124,58,237,0.07);display:flex;gap:5px;align-items:center;}
.td{width:6px;height:6px;border-radius:50%;background:var(--p2);opacity:0.4;animation:td 1.4s ease infinite;}
.td:nth-child(2){animation-delay:0.2s;}.td:nth-child(3){animation-delay:0.4s;}
@keyframes td{0%,100%{transform:translateY(0);opacity:0.4;}50%{transform:translateY(-5px);opacity:1;}}

/* CRISIS BOX */
.crisis-box{background:linear-gradient(135deg,rgba(255,240,250,0.9),rgba(255,228,244,0.9));border:1px solid rgba(236,72,153,0.2);border-radius:14px;padding:1rem 1.2rem;font-size:0.82rem;color:#9d174d;line-height:1.75;animation:mi 0.35s ease;backdrop-filter:blur(8px);}
.crisis-box strong{display:block;margin-bottom:0.3rem;}

/* INPUT ZONE */
.inp-zone{padding:1rem 0 1.2rem;flex-shrink:0;background:linear-gradient(to top,rgba(253,244,255,1) 80%,transparent);}
.inp-wrap{display:flex;gap:0.6rem;align-items:flex-end;background:rgba(255,255,255,0.82);border:1.5px solid rgba(192,132,252,0.22);border-radius:22px;padding:0.6rem 0.6rem 0.6rem 1.2rem;box-shadow:0 4px 25px rgba(124,58,237,0.08);backdrop-filter:blur(12px);transition:border-color 0.3s,box-shadow 0.3s;}
.inp-wrap:focus-within{border-color:rgba(168,85,247,0.45);box-shadow:0 4px 35px rgba(124,58,237,0.14);}
.inp-txt{flex:1;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--text);resize:none;outline:none;max-height:100px;line-height:1.5;}
.inp-txt::placeholder{color:var(--textm);}
.send-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--p2),var(--p3));border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.95rem;flex-shrink:0;box-shadow:0 4px 15px rgba(124,58,237,0.3);transition:all 0.3s;}
.send-btn:hover{transform:scale(1.1);box-shadow:0 6px 25px rgba(124,58,237,0.45);}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

@media(max-width:600px){.chat-area{padding:1rem 1rem 0;}.topbar{padding:0.75rem 1rem;}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="orb o1"></div>
<div class="orb o2"></div>
<canvas id="c"></canvas>

<!-- TOP BAR -->
<div class="topbar">
  <a href="index.html" class="topbar-logo">
    <div class="topbar-logo-dot">🌸</div>
    Memet
  </a>
  <div class="topbar-right">
    <!-- Shown when logged in -->
    <div class="user-chip" id="userChip" style="display:none">
      <div class="user-chip-av">🧑</div>
      <span class="user-chip-name" id="userChipName"></span>
    </div>
    <button class="topbar-btn" id="historyBtn" style="display:none" onclick="loadHistory()">📜 History</button>
    <button class="logout-btn" id="logoutBtn" onclick="doLogout()">Sign out</button>
  </div>
</div>

<!-- GUEST BANNER (shown only for guests) -->
<div class="guest-banner" id="guestBanner" style="display:none">
  <p>✨ You're chatting as a guest — chats won't be saved</p>
  <a href="auth.html">Create free account to save chats 💜</a>
</div>

<!-- CHAT AREA -->
<div class="chat-area">
  <div class="memet-hd">
    <div class="av-wrap">
      <div class="av-ring"></div>
      <div class="av-ring2"></div>
      <div class="av-main">🌸</div>
    </div>
    <h2>Memet</h2>
    <p id="memet-status">Your emotional sanctuary — always here 💜</p>
  </div>

  <div class="mood-row">
    <span style="font-size:0.72rem;color:var(--textm);align-self:center;margin-right:0.2rem;">I'm feeling:</span>
    <button class="mood-chip" onclick="setMood(this,'😔 Sad')">😔 Sad</button>
    <button class="mood-chip" onclick="setMood(this,'😰 Anxious')">😰 Anxious</button>
    <button class="mood-chip" onclick="setMood(this,'😤 Frustrated')">😤 Frustrated</button>
    <button class="mood-chip" onclick="setMood(this,'😐 Numb')">😐 Numb</button>
    <button class="mood-chip" onclick="setMood(this,'🙂 Okay')">🙂 Okay</button>
    <button class="mood-chip" onclick="setMood(this,'😊 Good')">😊 Good</button>
  </div>

  <div class="msgs" id="msgs"></div>

  <div class="inp-zone">
    <div class="inp-wrap">
      <textarea class="inp-txt" id="inp" placeholder="Share what's on your mind... 💜" rows="1" onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
    </div>
  </div>
</div>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── CONFIG ──
const SUPABASE_URL = 'https://fyvpsndebjlxuafmlrrw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5dnBzbmRlYmpseHVhZm1scnJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDY2MjAsImV4cCI6MjA4ODE4MjYyMH0.hWqgIb5qz90PIEvRvBh-x07fDjxDxoVcrUo5pYd4IWcs'; // Replace this!
const BACKEND = 'https://memet-2nmm.onrender.com';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── STATE ──
let currentUser = null;
let isGuest = false;
let mood = '';
let chatHistory = [];

// ── PARTICLES ──
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,pts=[];
function rs(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
rs();window.addEventListener('resize',rs);
const cols=['rgba(192,132,252,','rgba(249,168,212,','rgba(167,139,250,'];
class P{constructor(){this.r();}r(){this.x=Math.random()*W;this.y=Math.random()*H;this.s=Math.random()*2+0.5;this.vx=(Math.random()-0.5)*0.35;this.vy=-Math.random()*0.45-0.1;this.c=cols[Math.floor(Math.random()*cols.length)];this.a=Math.random()*0.5+0.2;this.l=Math.random()*200+100;this.ml=this.l;this.w=Math.random()*Math.PI*2;this.ws=Math.random()*0.02;}u(){this.w+=this.ws;this.x+=this.vx+Math.sin(this.w)*0.3;this.y+=this.vy;this.l--;if(this.l<=0||this.y<-10)this.r();}d(){const a=this.a*(this.l/this.ml);ctx.beginPath();ctx.arc(this.x,this.y,this.s,0,Math.PI*2);ctx.fillStyle=this.c+a+')';ctx.fill();}}
for(let i=0;i<80;i++)pts.push(new P());
(function loop(){ctx.clearRect(0,0,W,H);pts.forEach(p=>{p.u();p.d();});requestAnimationFrame(loop);})();

// ── AUTH CHECK ON LOAD ──
window.addEventListener('load', async () => {
  // Check for Supabase magic link callback
  const { data: { session } } = await supabase.auth.getSession();

  if (session && session.user) {
    // Logged in via magic link
    currentUser = {
      id: session.user.id,
      email: session.user.email,
      name: session.user.email.split('@')[0]
    };
    setupLoggedIn(currentUser.name);
    return;
  }

  // Check for guest
  const guest = sessionStorage.getItem('memet_guest');
  if (guest === 'true') {
    isGuest = true;
    setupGuest();
    return;
  }

  // Check for stored user from sessionStorage
  const stored = sessionStorage.getItem('memet_user');
  if (stored) {
    try {
      currentUser = JSON.parse(stored);
      setupLoggedIn(currentUser.name);
      return;
    } catch(e) {}
  }

  // No auth — redirect to auth page
  window.location.href = 'auth.html';
});

// ── SETUP LOGGED IN ──
function setupLoggedIn(name) {
  document.getElementById('userChip').style.display = 'flex';
  document.getElementById('userChipName').textContent = name;
  document.getElementById('historyBtn').style.display = 'inline-block';
  document.getElementById('guestBanner').style.display = 'none';
  // Personalized greeting
  addMsg('memet', `Welcome back, ${name} 💜 I'm so glad you're here. How are you feeling today?`);
}

// ── SETUP GUEST ──
function setupGuest() {
  document.getElementById('userChip').style.display = 'none';
  document.getElementById('historyBtn').style.display = 'none';
  document.getElementById('guestBanner').style.display = 'flex';
  document.getElementById('logoutBtn').textContent = 'Sign in';
  addMsg('memet', "Hello, I'm so glad you found your way here 💜 I'm Memet — a warm, caring companion here to listen without judgment. How are you feeling right now?");
}

// ── LOGOUT ──
async function doLogout() {
  if (isGuest) {
    sessionStorage.removeItem('memet_guest');
    window.location.href = 'auth.html';
    return;
  }
  await supabase.auth.signOut();
  sessionStorage.removeItem('memet_user');
  sessionStorage.removeItem('memet_guest');
  window.location.href = 'auth.html';
}

// ── LOAD HISTORY ──
async function loadHistory() {
  if (!currentUser) return;
  try {
    const r = await fetch(`${BACKEND}/history/${currentUser.id}`);
    const data = await r.json();
    if (!r.ok || !data.messages || data.messages.length === 0) {
      addMsg('memet', 'No past conversations yet 💜 This is a fresh start!');
      return;
    }
    document.getElementById('msgs').innerHTML = '';
    chatHistory = [];
    data.messages.forEach(m => {
      const role = m.role === 'assistant' ? 'memet' : m.role;
      addMsg(role, m.content);
      chatHistory.push({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content });
    });
    addMsg('memet', '✨ Your past conversations are restored. I remember you 💜');
  } catch(e) {
    addMsg('memet', "Couldn't load history right now. Let's keep talking 💜");
  }
}

// ── CHAT HELPERS ──
function setMood(btn, m) {
  document.querySelectorAll('.mood-chip').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  mood = m;
}
function getTime() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
function addMsg(role, text) {
  const c = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = `mrow ${role}`;
  if (role === 'memet') {
    d.innerHTML = `<div class="mav">🌸</div><div class="mbody"><div class="mbub">${text}</div><div class="mt">${getTime()}</div></div>`;
  } else {
    d.innerHTML = `<div class="mbody"><div class="mbub">${text}</div><div class="mt">${getTime()}</div></div><div class="mav" style="background:linear-gradient(135deg,#ddd6fe,#c084fc)">🧑</div>`;
  }
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}
function showTyping() {
  const c = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'mrow memet'; d.id = 'typing';
  d.innerHTML = `<div class="mav">🌸</div><div class="typ-row"><div class="typ-bub"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function isCrisis(t) {
  try {
    const l = t.toLowerCase();
    return ['suicide','kill myself','end my life','want to die','self harm','cutting','hurt myself','no reason to live','cant go on','ending it'].some(k => l.includes(k));
  } catch(e) { return false; }
}
function showCrisis() {
  const c = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'crisis-box';
  d.innerHTML = `<strong>💜 You are not alone — support is available right now</strong>iCall (India): <strong>9152987821</strong> · Vandrevala Foundation: <strong>1860-2662-345</strong> (24/7 free)<br/>If in immediate danger: <strong>112</strong>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}

// ── SEND ──
async function send() {
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if (!txt) return;

  addMsg('user', txt);
  inp.value = ''; inp.style.height = 'auto';
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  if (isCrisis(txt)) showCrisis();
  showTyping();

  const wakeTimer = setTimeout(() => {
    const t = document.getElementById('typing');
    if (t) { const b = t.querySelector('.typ-bub'); if (b) b.innerHTML = '<span style="font-size:0.75rem;color:var(--textm);padding:0 0.2rem">Waking up, just a moment... 💜</span>'; }
  }, 5000);

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 60000);

    const r = await fetch(`${BACKEND}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: txt,
        history: chatHistory.slice(-12),
        mood: mood,
        user_id: currentUser ? currentUser.id : null
      }),
      signal: controller.signal
    });

    clearTimeout(timeout); clearTimeout(wakeTimer);

    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || 'err'); }
    const data = await r.json();
    const reply = data.reply;

    chatHistory.push({ role: 'user', content: txt });
    chatHistory.push({ role: 'assistant', content: reply });

    hideTyping();
    addMsg('memet', reply);

  } catch(e) {
    clearTimeout(wakeTimer); hideTyping();
    if (e.name === 'AbortError' || (e.message && e.message.includes('timeout')))
      addMsg('memet', 'The server took a moment to wake up 💜 Please send your message again.');
    else if (e.message && e.message.includes('429'))
      addMsg('memet', 'Just a moment — please try again in a few seconds 💜');
    else
      addMsg('memet', 'Something went wrong. Please try again 💜');
  }
  btn.disabled = false;
}

function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function autoResize(el) { if (!el) return; el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
</script>
