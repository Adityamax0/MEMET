<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Memet — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--p1:#c084fc;--p2:#a855f7;--p3:#7c3aed;--r1:#f9a8d4;--cream:#fdf4ff;--text:#1a0533;--texts:#6b21a8;--textm:#a78bca;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);overflow:hidden;}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(233,213,255,0.7) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 20%,rgba(249,168,212,0.4) 0%,transparent 55%),linear-gradient(160deg,#fdf4ff 0%,#fae8ff 40%,#ede9fe 100%);animation:bgS 15s ease-in-out infinite alternate;}
@keyframes bgS{0%{filter:hue-rotate(0deg);}100%{filter:hue-rotate(12deg);}}
.orb{position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;}
.o1{width:500px;height:500px;background:radial-gradient(circle,rgba(192,132,252,0.3),transparent 70%);top:-150px;left:-150px;}
.o2{width:400px;height:400px;background:radial-gradient(circle,rgba(249,168,212,0.25),transparent 70%);bottom:-100px;right:-100px;}
canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}

.wrap{position:relative;z-index:1;height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}

.box{background:rgba(255,255,255,0.78);border:1px solid rgba(192,132,252,0.22);backdrop-filter:blur(24px);border-radius:28px;padding:3rem 2.5rem;width:100%;max-width:420px;box-shadow:0 20px 80px rgba(124,58,237,0.12);animation:ru 0.6s cubic-bezier(0.16,1,0.3,1) both;}
.box::before{content:'';position:absolute;inset:-1px;border-radius:28px;background:linear-gradient(135deg,rgba(192,132,252,0.25),rgba(249,168,212,0.15),transparent);z-index:-1;border-radius:28px;}

/* Logo */
.logo-wrap{text-align:center;margin-bottom:2.5rem;}
.logo-av{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--p2),var(--r1));display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1rem;box-shadow:0 8px 30px rgba(168,85,247,0.4);animation:ab 4s ease-in-out infinite;}
@keyframes ab{0%,100%{box-shadow:0 8px 30px rgba(168,85,247,0.35),0 0 0 0 rgba(168,85,247,0.2);}50%{box-shadow:0 8px 50px rgba(168,85,247,0.55),0 0 0 12px rgba(168,85,247,0);}}
.logo-wrap h2{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:400;color:var(--text);}
.logo-wrap p{font-size:0.82rem;color:var(--textm);margin-top:0.3rem;}

/* Back link */
.back{display:inline-flex;align-items:center;gap:0.4rem;font-size:0.78rem;color:var(--textm);text-decoration:none;margin-bottom:1.5rem;transition:color 0.2s;}
.back:hover{color:var(--p3);}

/* States */
#stateForm, #stateSent{transition:all 0.3s;}

/* Form */
.field{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1.2rem;}
.field label{font-size:0.78rem;color:var(--texts);font-weight:500;letter-spacing:0.02em;}
.inp{padding:0.85rem 1.1rem;border-radius:14px;border:1.5px solid rgba(192,132,252,0.25);background:rgba(255,255,255,0.85);font-family:'DM Sans',sans-serif;font-size:0.92rem;color:var(--text);outline:none;transition:border-color 0.25s,box-shadow 0.25s;width:100%;}
.inp:focus{border-color:rgba(168,85,247,0.5);box-shadow:0 0 0 3px rgba(168,85,247,0.08);}
.inp::placeholder{color:var(--textm);}

.btn-main{width:100%;padding:0.95rem;border-radius:50px;background:linear-gradient(135deg,var(--p1),var(--p2),var(--p3));color:white;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;border:none;cursor:pointer;box-shadow:0 8px 30px rgba(124,58,237,0.35);transition:all 0.3s;position:relative;overflow:hidden;margin-top:0.5rem;}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(124,58,237,0.45);}
.btn-main:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.btn-main::after{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:linear-gradient(to right,transparent,rgba(255,255,255,0.25),transparent);transform:skewX(-15deg);transition:left 0.6s;}
.btn-main:hover::after{left:120%;}

.err{background:rgba(255,220,220,0.7);border:1px solid rgba(220,100,100,0.3);border-radius:10px;padding:0.7rem 1rem;font-size:0.82rem;color:#b91c1c;margin-bottom:1rem;display:none;}
.err.show{display:block;}

.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(192,132,252,0.2);}
.divider span{font-size:0.75rem;color:var(--textm);}

.guest-btn{width:100%;padding:0.85rem;border-radius:50px;background:rgba(255,255,255,0.7);border:1px solid rgba(192,132,252,0.25);color:var(--texts);font-family:'DM Sans',sans-serif;font-size:0.88rem;cursor:pointer;backdrop-filter:blur(10px);transition:all 0.3s;}
.guest-btn:hover{background:rgba(233,213,255,0.7);transform:translateY(-1px);}
.guest-note{text-align:center;margin-top:0.75rem;font-size:0.72rem;color:var(--textm);}

/* Sent state */
#stateSent{display:none;text-align:center;}
.sent-icon{font-size:3.5rem;margin-bottom:1.2rem;animation:si 1s ease both;}
@keyframes si{from{transform:scale(0) rotate(-20deg);opacity:0;}to{transform:scale(1) rotate(0deg);opacity:1;}}
#stateSent h3{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:400;margin-bottom:0.75rem;}
#stateSent p{font-size:0.88rem;color:var(--textm);line-height:1.7;margin-bottom:1.5rem;}
#stateSent .email-display{background:rgba(233,213,255,0.5);border:1px solid rgba(192,132,252,0.3);border-radius:10px;padding:0.6rem 1rem;font-size:0.85rem;color:var(--p3);font-weight:500;margin-bottom:1.5rem;}
.resend-btn{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:0.8rem;color:var(--textm);cursor:pointer;text-decoration:underline;transition:color 0.2s;}
.resend-btn:hover{color:var(--p3);}

@keyframes ru{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="orb o1"></div>
<div class="orb o2"></div>
<canvas id="c"></canvas>

<div class="wrap">
  <div class="box">
    <a href="index.html" class="back">← Back to home</a>

    <div class="logo-wrap">
      <div class="logo-av">🌸</div>
      <h2>Welcome to Memet</h2>
      <p>Enter your email — we'll send you a magic link 💜</p>
    </div>

    <!-- FORM STATE -->
    <div id="stateForm">
      <div class="err" id="errBox"></div>
      <div class="field">
        <label>Your Email</label>
        <input class="inp" type="email" id="emailInp" placeholder="you@example.com" onkeydown="if(event.key==='Enter')sendMagicLink()"/>
      </div>
      <button class="btn-main" id="sendBtn" onclick="sendMagicLink()">Send Magic Link ✨</button>

      <div class="divider"><span>or</span></div>
      <button class="guest-btn" onclick="continueAsGuest()">✨ Try Memet for free — no account needed</button>
      <p class="guest-note">Guest chats are not saved between sessions</p>
    </div>

    <!-- SENT STATE -->
    <div id="stateSent">
      <div class="sent-icon">📬</div>
      <h3>Check your inbox!</h3>
      <div class="email-display" id="sentEmail"></div>
      <p>We sent a magic link to your email. Click it to instantly open your Memet space — no password needed 💜</p>
      <p style="font-size:0.78rem;color:var(--textm);margin-bottom:1rem;">Can't find it? Check your spam folder.</p>
      <button class="resend-btn" onclick="showForm()">← Use a different email</button>
    </div>
  </div>
</div>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── Particles ──
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,pts=[];
function rs(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
rs();window.addEventListener('resize',rs);
const cols=['rgba(192,132,252,','rgba(249,168,212,','rgba(167,139,250,'];
class P{constructor(){this.r();}r(){this.x=Math.random()*W;this.y=Math.random()*H;this.s=Math.random()*2+0.5;this.vx=(Math.random()-0.5)*0.35;this.vy=-Math.random()*0.45-0.1;this.c=cols[Math.floor(Math.random()*cols.length)];this.a=Math.random()*0.5+0.2;this.l=Math.random()*200+100;this.ml=this.l;this.w=Math.random()*Math.PI*2;this.ws=Math.random()*0.02;}u(){this.w+=this.ws;this.x+=this.vx+Math.sin(this.w)*0.3;this.y+=this.vy;this.l--;if(this.l<=0||this.y<-10)this.r();}d(){const a=this.a*(this.l/this.ml);ctx.beginPath();ctx.arc(this.x,this.y,this.s,0,Math.PI*2);ctx.fillStyle=this.c+a+')';ctx.fill();}}
for(let i=0;i<80;i++)pts.push(new P());
(function loop(){ctx.clearRect(0,0,W,H);pts.forEach(p=>{p.u();p.d();});requestAnimationFrame(loop);})();

// ── Supabase Init ──
// IMPORTANT: Replace these with your actual Supabase project values
const SUPABASE_URL = 'https://fyvpsndebjlxuafmlrrw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5dnBzbmRlYmpseHVhZm1scnJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDY2MjAsImV4cCI6MjA4ODE4MjYyMH0.hWqgIb5qz90PIEvRvBh-x07fDjxDxoVcrUo5pYd4IWc'; // Replace this!
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Check if already logged in ──
window.addEventListener('load', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session && session.user) {
    // Already logged in — go straight to chat
    sessionStorage.setItem('memet_user', JSON.stringify({
      id: session.user.id,
      email: session.user.email,
      name: session.user.email.split('@')[0]
    }));
    window.location.href = 'chat.html';
  }
});

// ── Magic Link ──
async function sendMagicLink() {
  const email = document.getElementById('emailInp').value.trim();
  const errBox = document.getElementById('errBox');
  errBox.classList.remove('show');

  if (!email || !email.includes('@')) {
    errBox.textContent = 'Please enter a valid email address';
    errBox.classList.add('show');
    return;
  }

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const { error } = await sb.auth.signInWithOtp({
      email: email,
      options: {
        emailRedirectTo: window.location.origin + '/chat.html'
      }
    });

    if (error) {
      errBox.textContent = error.message || 'Something went wrong. Please try again.';
      errBox.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Send Magic Link ✨';
      return;
    }

    // Show success state
    document.getElementById('sentEmail').textContent = email;
    document.getElementById('stateForm').style.display = 'none';
    document.getElementById('stateSent').style.display = 'block';

  } catch (e) {
    errBox.textContent = 'Connection error. Please check your internet and try again.';
    errBox.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Send Magic Link ✨';
  }
}

function showForm() {
  document.getElementById('stateSent').style.display = 'none';
  document.getElementById('stateForm').style.display = 'block';
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('sendBtn').textContent = 'Send Magic Link ✨';
}

// ── Guest ──
function continueAsGuest() {
  sessionStorage.setItem('memet_guest', 'true');
  sessionStorage.removeItem('memet_user');
  window.location.href = 'chat.html';
}
</script>
</body>
</html>
